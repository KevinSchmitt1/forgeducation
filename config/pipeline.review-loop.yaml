# Closed-loop pipeline: builds a lesson, critiques it from the learner's POV, then
# lets the orchestrator iterate on the current best notebook until it is good enough
# or the revision budget runs out.
#
#   brief    \
#   profile  -> planner -> code_author -> executor -> student -> reviewer
#
# The revision loop itself lives under `revision:` so the orchestrator can build
# as many revise/re-run/re-critique rounds as the policy allows.

name: review-loop

defaults:
  provider: openai
  model: gpt-5-mini
  max_tokens: 4096

stage_models:
  planner:
    provider: openai
    model: gpt-5-mini
    max_tokens: 4096
  code_author:
    provider: openai
    model: gpt-5
    max_tokens: 16384
  student:
    provider: openai
    model: gpt-5-mini
    max_tokens: 4096
  reviewer:
    provider: openai
    model: gpt-5-mini
    max_tokens: 4096
  reviser:
    provider: openai
    model: gpt-5
    max_tokens: 16384

stages:
  - name: planner
    type: llm
    persona: planner.md
    inputs: [brief, profile]
    output: lesson_plan
    output_kind: text

  - name: code_author
    type: llm
    persona: code_author.md
    inputs: [lesson_plan, profile]
    output: notebook
    output_kind: notebook

  - name: executor
    type: executor
    inputs: [notebook]
    output: execution_report
    params: {timeout: 120, kernel: python3}

  - name: student
    type: llm
    persona: student.md
    inputs: [notebook, execution_report, profile]
    output: student_feedback
    output_kind: text

  - name: reviewer
    type: llm
    persona: reviewer.md
    inputs: [notebook, execution_report, profile]
    output: reviewer_feedback
    output_kind: text

revision:
  max_iterations: 3
  min_quality_score: 90
  require_progress: true
  reviser: reviser.md
  critics:
    - student.md
    - reviewer.md
  executor_params:
    timeout: 120
    kernel: python3
