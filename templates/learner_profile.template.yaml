# Learner Profile Template
# ========================
# Copy this file, fill in every field, then pass it with:
#   forged build --topic "..." --learner-profile path/to/profile.yaml
#
# All seven fields are required. Enum fields only accept the listed values.

name: ""
# Display name for this learner persona.
# Example: "Backend Junior Developer"

description: ""
# One short paragraph describing the learner and their goal.
# Example: "3 years of Python/Django; transitioning toward SRE roles."

prior_knowledge:
  - ""
# Bullet list of things the learner already knows well.
# Agents will not re-explain these; be honest to avoid over-simplified content.
# Example:
#   - "Python and basic data structures (lists, dicts, sets)"
#   - "SQL and relational databases"

environment: "jupyter_notebook"
# Where the lesson will run. One of:
#   jupyter_notebook | google_colab | vscode | ide | cli | book

material_density: "standard"
# How much explanation and how many examples per concept. One of:
#   dense    — terse explanations, ~1 canonical example per concept
#   standard — balanced explanations, 2–3 examples per concept
#   rich     — elaborate explanations, multiple examples, extension ideas

learning_style: "hands_on"
# How the learner prefers to absorb material. One of:
#   socratic | project_based | visual | hands_on | reference

background_context: ""
# Any other constraints or context relevant to content generation.
# Example: "Goal: transition to SRE. No GPU; CPU-only environment."
