name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint · type · test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # Pinned to the project's target runtime (see .python-version); the
          # app ships in a fixed-Python container, so testing other minors here
          # would only check configurations that never run in production.
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (editable + dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Register Jupyter kernel
        # The executor tests run real notebooks via nbclient, which needs a
        # "python3" kernelspec — fresh runners don't ship one.
        run: python -m ipykernel install --user --name python3

      - name: Lint (ruff)
        run: ruff check forged tests

      - name: Type check (mypy)
        run: mypy

      - name: Tests + coverage
        # --cov-fail-under enforces the project's 80% minimum.
        run: pytest --cov=forged --cov-report=term-missing --cov-fail-under=80
