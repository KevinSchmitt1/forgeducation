name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint · type · test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (editable + dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Register Jupyter kernel
        # The executor tests run real notebooks via nbclient, which needs a
        # "python3" kernelspec — fresh runners don't ship one.
        run: python -m ipykernel install --user --name python3

      - name: Lint (ruff)
        run: ruff check eduforge tests

      - name: Type check (mypy)
        run: mypy

      - name: Tests + coverage
        # --cov-fail-under enforces the project's 80% minimum.
        run: pytest --cov=eduforge --cov-report=term-missing --cov-fail-under=80
